name: kwant-api-automation run

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install Newman & Allure
        run: |
          npm install -g newman newman-reporter-allure newman-reporter-json
          npm install -g allure-commandline --allow-root

      # ─── TREND FIX: pull previous history from gh-pages before generating ───
      - name: 📂 Restore Allure History from gh-pages
        run: |
          mkdir -p allure-results/history

          # Try to fetch the history folder from the previously deployed gh-pages branch
          git fetch origin gh-pages --depth=1 2>/dev/null || echo "No gh-pages branch yet — skipping history restore"

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout origin/gh-pages -- history 2>/dev/null || echo "No history folder on gh-pages yet"
            if [ -d "history" ]; then
              cp -r history/. allure-results/history/
              echo "✅ Restored $(ls allure-results/history | wc -l) history files"
            else
              echo "ℹ️ No history to restore on this run"
            fi
          fi

      - name: 🚀 Run Newman Tests
        id: newman
        continue-on-error: true
        run: |
          echo "Running Postman Collection..."
          mkdir -p allure-results

          newman run "https://api.getpostman.com/collections/$COLLECTION_UID?apikey=$POSTMAN_API_KEY" \
            --reporters cli,allure,json \
            --reporter-allure-export allure-results \
            --reporter-json-export newman-report.json || true

          echo "Files after newman run:"
          ls -la
          ls -la allure-results || echo "allure-results is empty"

          if [ -f "newman-report.json" ]; then
            echo "JSON report found ✅"

            TOTAL=$(jq '.run.stats.requests.total' newman-report.json)
            PASSED=$(jq '.run.stats.requests.total - .run.stats.requests.failed' newman-report.json)
            FAILED=$(jq '.run.stats.requests.failed' newman-report.json)

            SKIPPED=$(jq '.run.stats.items.total - .run.stats.items.pending - .run.stats.requests.total' newman-report.json 2>/dev/null || echo 0)
            SKIPPED=$(( SKIPPED < 0 ? 0 : SKIPPED ))

            TOTAL_TIME_MS=$(jq '.run.timings.completed - .run.timings.started' newman-report.json)
            if [[ "$TOTAL_TIME_MS" == "null" || "$TOTAL_TIME_MS" == "" ]]; then
              TOTAL_TIME="N/A"
            else
              SECS=$(awk "BEGIN {printf \"%.1f\", $TOTAL_TIME_MS / 1000}")
              TOTAL_TIME="${SECS}s"
            fi

          else
            echo "JSON report NOT found ❌"
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; TOTAL_TIME="N/A"
          fi

          if [[ "$TOTAL" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL) * 100}")
          else
            SUCCESS_RATE="0.00"
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "total=$TOTAL"               >> $GITHUB_OUTPUT
          echo "passed=$PASSED"             >> $GITHUB_OUTPUT
          echo "failed=$FAILED"             >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"           >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME"     >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"       >> $GITHUB_OUTPUT

      - name: 📊 Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "Generating Allure report..."
            allure generate allure-results --clean -o allure-report
          else
            echo "No allure-results found — creating placeholder"
            mkdir -p allure-report
          fi

          if [ ! -f "allure-report/index.html" ]; then
            cat > allure-report/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>kwant.ai API Test Report</title>
            <style>
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
              .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:48px;text-align:center;max-width:480px}
              h1{color:#f0f6fc;font-size:24px;margin:0 0 12px}
              p{color:#8b949e;margin:0 0 24px;line-height:1.6}
              .badge{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 12px;font-size:13px;color:#8b949e}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>kwant.ai API Automation</h1>
              <p>The test report will appear here after the next scheduled run completes successfully.</p>
              <span class="badge">Waiting for first run</span>
            </div>
          </body>
          </html>
          HTMLEOF
            echo "Placeholder index.html created ✅"
          fi

          # ─── Copy history out so gh-pages root contains a /history folder ───
          # This lets the next run restore it via: git checkout origin/gh-pages -- history
          if [ -d "allure-report/history" ]; then
            cp -r allure-report/history ./history
            echo "✅ Copied history to repo root for next run"
          fi

          echo "Final allure-report contents:"
          ls -la allure-report/

      - name: 🌐 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          # ─── Also publish the /history folder at root so we can restore it ───
          keep_files: false
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          # Commit the /history folder alongside the report
          # We add it manually in the next step instead

      # ─── TREND FIX pt2: push /history folder into gh-pages branch root ───
      - name: 📁 Persist History on gh-pages Branch
        if: always()
        run: |
          if [ ! -d "allure-report/history" ]; then
            echo "No history to persist"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to gh-pages and add history folder
          git fetch origin gh-pages
          git checkout gh-pages

          # Copy the history folder to the root of gh-pages
          rm -rf history
          cp -r allure-report/history ./history 2>/dev/null || cp -r history ./history

          git add history/
          git diff --cached --quiet && echo "No history changes" || git commit -m "chore: update allure trend history [skip ci]"
          git push origin gh-pages
          echo "✅ Trend history persisted on gh-pages"

      - name: 💬 Send Slack Notification
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"

          TOTAL="${{ steps.newman.outputs.total }}"
          PASSED="${{ steps.newman.outputs.passed }}"
          FAILED="${{ steps.newman.outputs.failed }}"
          SKIPPED="${{ steps.newman.outputs.skipped }}"
          SUCCESS_RATE="${{ steps.newman.outputs.success_rate }}"
          TOTAL_TIME="${{ steps.newman.outputs.total_time }}"
          TIMESTAMP="${{ steps.newman.outputs.timestamp }}"

          if [[ "$FAILED" -eq 0 && "$TOTAL" -gt 0 ]]; then
            HEADER="✅  API tests completed successfully"
            COLOR="#2eb886"
          elif [[ "$TOTAL" -eq 0 ]]; then
            HEADER="⚠️  API tests did not run properly"
            COLOR="#daa038"
          else
            HEADER="🚨  PROD Health Check — ${FAILED} test(s) failed"
            COLOR="#cc3232"
          fi

          PAYLOAD=$(jq -n \
            --arg color   "$COLOR" \
            --arg header  "$HEADER" \
            --arg total   "$TOTAL" \
            --arg passed  "$PASSED" \
            --arg failed  "$FAILED" \
            --arg skipped "$SKIPPED" \
            --arg rate    "$SUCCESS_RATE%" \
            --arg time    "$TOTAL_TIME" \
            --arg ts      "$TIMESTAMP" \
            --arg url     "$REPORT_URL" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: $header, emoji: true }
                  },
                  { type: "divider" },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: "*Total Tests*\n:bar_chart:  \($total)" },
                      { type: "mrkdwn", text: "*Passed*\n:white_check_mark:  \($passed)" },
                      { type: "mrkdwn", text: "*Failed*\n:x:  \($failed)" },
                      { type: "mrkdwn", text: "*Skipped*\n:next_track_button:  \($skipped)" },
                      { type: "mrkdwn", text: "*Success Rate*\n:chart_with_upwards_trend:  \($rate)" },
                      { type: "mrkdwn", text: "*Total Time*\n:stopwatch:  \($time)" }
                    ]
                  },
                  { type: "divider" },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ":clock1:  Last Checked: \($ts)" }
                    ]
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "View Detailed Report :arrow_upper_right:", emoji: true },
                        url: $url,
                        style: "primary"
                      }
                    ]
                  }
                ]
              }]
            }')

          curl -s -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
