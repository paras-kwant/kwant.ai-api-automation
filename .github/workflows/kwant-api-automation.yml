name: kwant-api-automation

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📊 Install Allure CLI
        run: npm install -g allure-commandline

      - name: 🚀 Run Newman Tests & Generate JSON Report
        id: newman
        continue-on-error: true
        run: |
          # Run tests with JSON reporter
          npm run test -- --reporters cli,json --reporter-json-export newman-report.json || true

          # If JSON report exists, extract stats
          if [ -f "newman-report.json" ]; then
            TOTAL=$(jq '.run.stats.assertions.total' newman-report.json)
            PASSED=$(jq '.run.stats.assertions.passed' newman-report.json)
            FAILED=$(jq '.run.stats.assertions.failed' newman-report.json)
            SKIPPED=$(jq '.run.stats.assertions.skipped' newman-report.json)
            TOTAL_TIME=$(jq -r '.run.timings.completed - .run.timings.started' newman-report.json)
          else
            TOTAL=0
            PASSED=0
            FAILED=0
            SKIPPED=0
            TOTAL_TIME="N/A"
          fi

          # Calculate success rate safely
          if [[ "$TOTAL" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL) * 100}")
          else
            SUCCESS_RATE=0
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME ms" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: 🌐 Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 💬 Send Slack Notification
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"
          
          TOTAL="${{ steps.newman.outputs.total }}"
          PASSED="${{ steps.newman.outputs.passed }}"
          FAILED="${{ steps.newman.outputs.failed }}"
          SKIPPED="${{ steps.newman.outputs.skipped }}"
          SUCCESS_RATE="${{ steps.newman.outputs.success_rate }}"
          TOTAL_TIME="${{ steps.newman.outputs.total_time }}"
          TIMESTAMP="${{ steps.newman.outputs.timestamp }}"

          if [[ "$FAILED" -eq 0 && "$TOTAL" -gt 0 ]]; then
            STATUS="✅ API tests completed successfully"
            COLOR="good"
          elif [[ "$TOTAL" -eq 0 ]]; then
            STATUS="⚠️ API tests did not run properly"
            COLOR="warning"
          else
            STATUS="🚨 PROD Health Check tests failed"
            COLOR="danger"
          fi

          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg status "$STATUS" \
            --arg total "$TOTAL" \
            --arg passed "$PASSED" \
            --arg failed "$FAILED" \
            --arg skipped "$SKIPPED" \
            --arg success_rate "$SUCCESS_RATE%" \
            --arg total_time "$TOTAL_TIME" \
            --arg timestamp "$TIMESTAMP" \
            --arg preview_url "$PREVIEW_URL" \
            '{
              attachments: [
                {
                  color: $color,
                  title: $status,
                  fields: [
                    {title: "Total Assertions", value: $total, short: true},
                    {title: "✅ Passed", value: $passed, short: true},
                    {title: "❌ Failed", value: $failed, short: true},
                    {title: "⏭️ Skipped", value: $skipped, short: true},
                    {title: "📈 Success Rate", value: $success_rate, short: true},
                    {title: "⏳ Total Time", value: $total_time, short: true},
                    {title: "🕐 Last Checked", value: $timestamp, short: false}
                  ],
                  actions: [
                    {
                      type: "button",
                      text: "View Detailed Report",
                      url: $preview_url
                    }
                  ]
                }
              ]
            }')

          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
