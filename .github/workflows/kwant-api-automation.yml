name: kwant-api-automation run

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install Newman & Allure
        run: |
          npm install -g newman newman-reporter-allure newman-reporter-json
          npm install -g allure-commandline --allow-root

      # ─── STEP 1: Pull previous Allure history from gh-pages so trend graph works ───
      - name: 📂 Restore Allure History
        run: |
          mkdir -p allure-results/history

          git fetch origin gh-pages --depth=1 2>/dev/null \
            && echo "gh-pages fetched ✅" \
            || { echo "No gh-pages branch yet — skipping"; exit 0; }

          # Extract only the history folder directly from the remote ref (no checkout needed)
          git show origin/gh-pages:history/history-trend.json      > allure-results/history/history-trend.json      2>/dev/null || true
          git show origin/gh-pages:history/history.json             > allure-results/history/history.json             2>/dev/null || true
          git show origin/gh-pages:history/categories-trend.json   > allure-results/history/categories-trend.json   2>/dev/null || true
          git show origin/gh-pages:history/duration-trend.json     > allure-results/history/duration-trend.json     2>/dev/null || true
          git show origin/gh-pages:history/retry-trend.json        > allure-results/history/retry-trend.json        2>/dev/null || true

          RESTORED=$(ls allure-results/history | wc -l)
          echo "✅ Restored $RESTORED history files into allure-results/history/"

      # ─── STEP 2: Run Newman tests ───
      - name: 🚀 Run Newman Tests
        id: newman
        continue-on-error: true
        run: |
          echo "Running Postman Collection..."

          newman run "https://api.getpostman.com/collections/$COLLECTION_UID?apikey=$POSTMAN_API_KEY" \
            --reporters cli,allure,json \
            --reporter-allure-export allure-results \
            --reporter-json-export newman-report.json || true

          if [ -f "newman-report.json" ]; then
            echo "JSON report found ✅"

            TOTAL=$(jq '.run.stats.requests.total' newman-report.json)
            PASSED=$(jq '.run.stats.requests.total - .run.stats.requests.failed' newman-report.json)
            FAILED=$(jq '.run.stats.requests.failed' newman-report.json)

            SKIPPED=$(jq '(.run.stats.items.total // 0) - (.run.stats.items.pending // 0) - (.run.stats.requests.total // 0)' newman-report.json 2>/dev/null || echo 0)
            SKIPPED=$(( SKIPPED < 0 ? 0 : SKIPPED ))

            TOTAL_TIME_MS=$(jq '.run.timings.completed - .run.timings.started' newman-report.json)
            if [[ "$TOTAL_TIME_MS" == "null" || "$TOTAL_TIME_MS" == "" ]]; then
              TOTAL_TIME="N/A"
            else
              TOTAL_TIME=$(awk "BEGIN {printf \"%.1fs\", $TOTAL_TIME_MS / 1000}")
            fi
          else
            echo "JSON report NOT found ❌"
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; TOTAL_TIME="N/A"
          fi

          if [[ "$TOTAL" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL) * 100}")
          else
            SUCCESS_RATE="0.00"
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "total=$TOTAL"               >> $GITHUB_OUTPUT
          echo "passed=$PASSED"             >> $GITHUB_OUTPUT
          echo "failed=$FAILED"             >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"           >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME"     >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"       >> $GITHUB_OUTPUT

      # ─── STEP 3: Generate Allure HTML report (history already in allure-results/history) ───
      - name: 📊 Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "Generating Allure report..."
            allure generate allure-results --clean -o allure-report
            echo "✅ Report generated"
          else
            echo "No allure-results — creating placeholder"
            mkdir -p allure-report
          fi

          if [ ! -f "allure-report/index.html" ]; then
            cat > allure-report/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>kwant.ai API Test Report</title>
            <style>
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
              .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:48px;text-align:center;max-width:480px}
              h1{color:#f0f6fc;font-size:24px;margin:0 0 12px}
              p{color:#8b949e;margin:0 0 24px;line-height:1.6}
              .badge{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 12px;font-size:13px;color:#8b949e}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>kwant.ai API Automation</h1>
              <p>The test report will appear here after the next scheduled run.</p>
              <span class="badge">Waiting for first run</span>
            </div>
          </body>
          </html>
          HTMLEOF
            echo "Placeholder created ✅"
          fi

          echo "allure-report contents:"
          ls -la allure-report/
          echo "allure-report/history contents:"
          ls -la allure-report/history/ 2>/dev/null || echo "(no history folder)"

      # ─── STEP 4: Deploy report to gh-pages ───
      - name: 🌐 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: allure report [${{ steps.newman.outputs.timestamp }}]'

      # ─── STEP 5: Persist /history at root of gh-pages for next run to restore ───
      # Uses git show (no checkout) to avoid the "local changes overwritten" error
      - name: 📁 Persist Trend History on gh-pages
        if: always()
        run: |
          if [ ! -d "allure-report/history" ]; then
            echo "No history folder to persist — skipping"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch the freshly deployed gh-pages
          git fetch origin gh-pages

          # Create a temp worktree — avoids any local file conflicts entirely
          git worktree add /tmp/gh-pages-wt origin/gh-pages

          # Overwrite the history folder in the worktree
          rm -rf /tmp/gh-pages-wt/history
          cp -r allure-report/history /tmp/gh-pages-wt/history

          cd /tmp/gh-pages-wt
          git add history/
          if git diff --cached --quiet; then
            echo "History unchanged — nothing to commit"
          else
            git commit -m "chore: persist trend history [skip ci]"
            git push origin HEAD:gh-pages
            echo "✅ Trend history pushed to gh-pages root"
          fi

          # Clean up worktree
          cd $GITHUB_WORKSPACE
          git worktree remove /tmp/gh-pages-wt --force

      - name: 💬 Send Slack Notification
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"

          TOTAL="${{ steps.newman.outputs.total }}"
          PASSED="${{ steps.newman.outputs.passed }}"
          FAILED="${{ steps.newman.outputs.failed }}"
          SKIPPED="${{ steps.newman.outputs.skipped }}"
          SUCCESS_RATE="${{ steps.newman.outputs.success_rate }}"
          TOTAL_TIME="${{ steps.newman.outputs.total_time }}"
          TIMESTAMP="${{ steps.newman.outputs.timestamp }}"

          if [[ "$FAILED" -eq 0 && "$TOTAL" -gt 0 ]]; then
            HEADER="✅  API tests completed successfully"
            COLOR="#2eb886"
          elif [[ "$TOTAL" -eq 0 ]]; then
            HEADER="⚠️  API tests did not run properly"
            COLOR="#daa038"
          else
            HEADER="🚨  PROD Health Check — ${FAILED} test(s) failed"
            COLOR="#cc3232"
          fi

          PAYLOAD=$(jq -n \
            --arg color   "$COLOR" \
            --arg header  "$HEADER" \
            --arg total   "$TOTAL" \
            --arg passed  "$PASSED" \
            --arg failed  "$FAILED" \
            --arg skipped "$SKIPPED" \
            --arg rate    "$SUCCESS_RATE%" \
            --arg time    "$TOTAL_TIME" \
            --arg ts      "$TIMESTAMP" \
            --arg url     "$REPORT_URL" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: $header, emoji: true }
                  },
                  { type: "divider" },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: "*Total Tests*\n:bar_chart:  \($total)" },
                      { type: "mrkdwn", text: "*Passed*\n:white_check_mark:  \($passed)" },
                      { type: "mrkdwn", text: "*Failed*\n:x:  \($failed)" },
                      { type: "mrkdwn", text: "*Skipped*\n:next_track_button:  \($skipped)" },
                      { type: "mrkdwn", text: "*Success Rate*\n:chart_with_upwards_trend:  \($rate)" },
                      { type: "mrkdwn", text: "*Total Time*\n:stopwatch:  \($time)" }
                    ]
                  },
                  { type: "divider" },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ":clock1:  Last Checked: \($ts)" }
                    ]
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "View Detailed Report :arrow_upper_right:", emoji: true },
                        url: $url,
                        style: "primary"
                      }
                    ]
                  }
                ]
              }]
            }')

          curl -s -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
