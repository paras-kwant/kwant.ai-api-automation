name: kwant-api-automation run

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install Newman & Allure
        run: |
          npm install -g newman newman-reporter-allure newman-reporter-json
          npm install -g allure-commandline --allow-root

      - name: 📂 Restore Allure History
        run: |
          mkdir -p allure-results/history
          git fetch origin gh-pages --depth=1 2>/dev/null || { echo "No gh-pages yet"; exit 0; }
          for f in history-trend history categories-trend duration-trend retry-trend; do
            git show origin/gh-pages:history/${f}.json > allure-results/history/${f}.json 2>/dev/null || true
          done
          echo "✅ Restored $(ls allure-results/history | wc -l) history files"

      - name: 🚀 Run Newman Tests
        id: newman
        continue-on-error: true
        run: |
          mkdir -p allure-results

          newman run "https://api.getpostman.com/collections/$COLLECTION_UID?apikey=$POSTMAN_API_KEY" \
            --reporters cli,allure,json \
            --reporter-allure-export allure-results \
            --reporter-json-export newman-report.json || true

          if [ -f "newman-report.json" ]; then
            TOTAL=$(jq '.run.stats.requests.total' newman-report.json)
            PASSED=$(jq '.run.stats.requests.total - .run.stats.requests.failed' newman-report.json)
            FAILED=$(jq '.run.stats.requests.failed' newman-report.json)

            SKIPPED=$(jq '(.run.stats.items.total // 0) - (.run.stats.items.pending // 0) - (.run.stats.requests.total // 0)' newman-report.json 2>/dev/null || echo 0)
            SKIPPED=$(( SKIPPED < 0 ? 0 : SKIPPED ))

            START_MS=$(jq '.run.timings.started'   newman-report.json)
            END_MS=$(jq   '.run.timings.completed' newman-report.json)
            if [[ "$START_MS" != "null" && "$END_MS" != "null" ]]; then
              TOTAL_TIME=$(awk "BEGIN {printf \"%.1fs\", ($END_MS - $START_MS) / 1000}")
            else
              TOTAL_TIME="N/A"
            fi
          else
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; TOTAL_TIME="N/A"
          fi

          if [[ "$TOTAL" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL) * 100}")
          else
            SUCCESS_RATE="0.00"
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "total=$TOTAL"               >> $GITHUB_OUTPUT
          echo "passed=$PASSED"             >> $GITHUB_OUTPUT
          echo "failed=$FAILED"             >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"           >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME"     >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"       >> $GITHUB_OUTPUT

      - name: 📊 Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
          fi

          if [ ! -f "allure-report/index.html" ]; then
            cat > allure-report/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>kwant.ai API Test Report</title>
            <style>
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
              .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:48px;text-align:center;max-width:480px}
              h1{color:#f0f6fc;font-size:24px;margin:0 0 12px}
              p{color:#8b949e;margin:0 0 24px;line-height:1.6}
              .badge{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 12px;font-size:13px;color:#8b949e}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>kwant.ai API Automation</h1>
              <p>Report will appear after the next run.</p>
              <span class="badge">Waiting for first run</span>
            </div>
          </body>
          </html>
          HTMLEOF
          fi

      - name: 🌐 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: allure report [${{ steps.newman.outputs.timestamp }}]'

      - name: 📁 Persist Trend History (STRICT LAST 5 RUNS FIX)
        if: always()
        run: |
            set -e
        
            if [ ! -d "allure-results/history" ]; then
              echo "No history to persist"
              exit 0
            fi
        
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
        
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages-wt origin/gh-pages
        
            mkdir -p /tmp/gh-pages-wt/history
        
            echo "🔧 Enforcing strict last 5 runs per file..."
        
            for file in history-trend.json categories-trend.json duration-trend.json retry-trend.json; do
        
              SRC="allure-results/history/$file"
              DEST="/tmp/gh-pages-wt/history/$file"
        
              if [ -f "$SRC" ]; then
        
                echo "Processing $file"
        
                # ONLY keep last 5 entries
                jq 'if type=="array" then .[-5:] else . end' "$SRC" > "$DEST"
        
              fi
            done
        
            echo "📊 Final history files:"
            ls -la /tmp/gh-pages-wt/history
        
            cd /tmp/gh-pages-wt
            git add history/
        
            if git diff --cached --quiet; then
              echo "No history changes"
            else
              git commit -m "chore: enforce strict last 5 Allure trend runs [skip ci]"
              git push origin HEAD:gh-pages
              echo "✅ Fixed: strictly last 5 runs only"
            fi
        
            cd $GITHUB_WORKSPACE
            git worktree remove /tmp/gh-pages-wt --force

      - name: 💬 Send Slack Notification
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"

          TOTAL="${{ steps.newman.outputs.total }}"
          PASSED="${{ steps.newman.outputs.passed }}"
          FAILED="${{ steps.newman.outputs.failed }}"
          SKIPPED="${{ steps.newman.outputs.skipped }}"
          SUCCESS_RATE="${{ steps.newman.outputs.success_rate }}"
          TOTAL_TIME="${{ steps.newman.outputs.total_time }}"
          TIMESTAMP="${{ steps.newman.outputs.timestamp }}"

          if [[ "$FAILED" -eq 0 && "$TOTAL" -gt 0 ]]; then
            STATUS_EMOJI=":white_check_mark:"
            STATUS_TEXT="API tests completed successfully"
            COLOR="#2eb886"
          elif [[ "$TOTAL" -eq 0 ]]; then
            STATUS_EMOJI=":warning:"
            STATUS_TEXT="API tests did not run properly"
            COLOR="#daa038"
          else
            STATUS_EMOJI=":rotating_light:"
            STATUS_TEXT="PROD Health Check — ${FAILED} test(s) failed"
            COLOR="#cc3232"
          fi

          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg emoji "$STATUS_EMOJI" \
            --arg status "$STATUS_TEXT" \
            --arg total "$TOTAL" \
            --arg passed "$PASSED" \
            --arg failed "$FAILED" \
            --arg skipped "$SKIPPED" \
            --arg rate "$SUCCESS_RATE%" \
            --arg time "$TOTAL_TIME" \
            --arg ts "$TIMESTAMP" \
            --arg url "$REPORT_URL" \
            '{
              text: "\($emoji) \($status)",
              unfurl_links: false,
              unfurl_media: false,
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: "\($emoji)  *\($status)*"
                    }
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: "*Total Tests*\n\($total)" },
                      { type: "mrkdwn", text: ":white_check_mark: *Passed*\n\($passed)" },
                      { type: "mrkdwn", text: ":x: *Failed*\n\($failed)" },
                      { type: "mrkdwn", text: ":fast_forward: *Skipped*\n\($skipped)" },
                      { type: "mrkdwn", text: ":chart_with_upwards_trend: *Success Rate*\n\($rate)" },
                      { type: "mrkdwn", text: ":hourglass_flowing_sand: *Total Time*\n\($time)" }
                    ]
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ":clock1: *Last Checked*\n\($ts)" }
                    ]
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "View Detailed Report" },
                        url: $url,
                        style: "primary"
                      }
                    ]
                  }
                ]
              }]
            }')

          curl -s -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
