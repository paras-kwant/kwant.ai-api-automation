name: kwant-api-automation run

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install Newman & Allure
        run: |
          npm install -g newman newman-reporter-allure newman-reporter-json
          npm install -g allure-commandline --allow-root

      - name: 🚀 Run Newman Tests
        id: newman
        continue-on-error: true
        run: |
          echo "Running Postman Collection..."
          mkdir -p allure-results

          newman run "https://api.getpostman.com/collections/$COLLECTION_UID?apikey=$POSTMAN_API_KEY" \
            --reporters cli,allure,json \
            --reporter-allure-export allure-results \
            --reporter-json-export newman-report.json || true

          echo "Checking files..."
          ls -la
          ls -la allure-results || echo "allure-results is empty"

          if [ -f "newman-report.json" ]; then
            echo "JSON report found ✅"

            # --- Request-level counts (Total APIs tested) ---
            TOTAL=$(jq '.run.stats.requests.total'    newman-report.json)
            PASSED=$(jq '.run.stats.requests.total - .run.stats.requests.failed' newman-report.json)
            FAILED=$(jq '.run.stats.requests.failed'  newman-report.json)

            # Skipped = items that were never executed (pending items)
            SKIPPED=$(jq '.run.stats.items.total - .run.stats.items.pending - .run.stats.requests.total' newman-report.json 2>/dev/null || echo 0)
            # Clamp to 0 if negative
            SKIPPED=$(( SKIPPED < 0 ? 0 : SKIPPED ))

            # Total elapsed time in ms
            TOTAL_TIME_MS=$(jq '.run.timings.completed - .run.timings.started' newman-report.json)
            # Convert ms → human readable (e.g. "3.2s" or "1m 2s")
            if [[ "$TOTAL_TIME_MS" == "null" || "$TOTAL_TIME_MS" == "" ]]; then
              TOTAL_TIME="N/A"
            else
              SECS=$(awk "BEGIN {printf \"%.1f\", $TOTAL_TIME_MS / 1000}")
              TOTAL_TIME="${SECS}s"
            fi

          else
            echo "JSON report NOT found ❌"
            TOTAL=0
            PASSED=0
            FAILED=0
            SKIPPED=0
            TOTAL_TIME="N/A"
          fi

          if [[ "$TOTAL" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL) * 100}")
          else
            SUCCESS_RATE="0.00"
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "total=$TOTAL"               >> $GITHUB_OUTPUT
          echo "passed=$PASSED"             >> $GITHUB_OUTPUT
          echo "failed=$FAILED"             >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"           >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME"     >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"       >> $GITHUB_OUTPUT

      - name: 📊 Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "Generating Allure report from results..."
            allure generate allure-results --clean -o allure-report
          else
            echo "No allure-results found — creating placeholder"
            mkdir -p allure-report
          fi

          if [ ! -f "allure-report/index.html" ]; then
            cat > allure-report/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>kwant.ai API Test Report</title>
            <style>
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
              .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:48px;text-align:center;max-width:480px}
              h1{color:#f0f6fc;font-size:24px;margin:0 0 12px}
              p{color:#8b949e;margin:0 0 24px;line-height:1.6}
              .badge{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 12px;font-size:13px;color:#8b949e}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>kwant.ai API Automation</h1>
              <p>The test report will appear here after the next scheduled run completes successfully.</p>
              <span class="badge">Waiting for first run</span>
            </div>
          </body>
          </html>
          HTMLEOF
            echo "Placeholder index.html created ✅"
          fi

          echo "Final allure-report contents:"
          ls -la allure-report/

      - name: 🌐 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 💬 Send Slack Notification
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"

          TOTAL="${{ steps.newman.outputs.total }}"
          PASSED="${{ steps.newman.outputs.passed }}"
          FAILED="${{ steps.newman.outputs.failed }}"
          SKIPPED="${{ steps.newman.outputs.skipped }}"
          SUCCESS_RATE="${{ steps.newman.outputs.success_rate }}"
          TOTAL_TIME="${{ steps.newman.outputs.total_time }}"
          TIMESTAMP="${{ steps.newman.outputs.timestamp }}"

          if [[ "$FAILED" -eq 0 && "$TOTAL" -gt 0 ]]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="API tests completed successfully"
            COLOR="#2eb886"
          elif [[ "$TOTAL" -eq 0 ]]; then
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="API tests did not run properly"
            COLOR="#daa038"
          else
            STATUS_EMOJI="🚨"
            STATUS_TEXT="PROD Health Check tests failed"
            COLOR="#cc3232"
          fi

          # Build Slack Block Kit payload — rich card layout matching the dashboard style
          PAYLOAD=$(jq -n \
            --arg color        "$COLOR" \
            --arg status_emoji "$STATUS_EMOJI" \
            --arg status_text  "$STATUS_TEXT" \
            --arg total        "$TOTAL" \
            --arg passed       "$PASSED" \
            --arg failed       "$FAILED" \
            --arg skipped      "$SKIPPED" \
            --arg rate         "$SUCCESS_RATE%" \
            --arg time         "$TOTAL_TIME" \
            --arg ts           "$TIMESTAMP" \
            --arg url          "$REPORT_URL" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: {
                      type: "plain_text",
                      text: "\($status_emoji) \($status_text)",
                      emoji: true
                    }
                  },
                  {
                    type: "divider"
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: "*Total Tests*\n\($total)" },
                      { type: "mrkdwn", text: "*✅ Passed*\n\($passed)" },
                      { type: "mrkdwn", text: "*❌ Failed*\n\($failed)" },
                      { type: "mrkdwn", text: "*⏭️ Skipped*\n\($skipped)" },
                      { type: "mrkdwn", text: "*📈 Success Rate*\n\($rate)" },
                      { type: "mrkdwn", text: "*⏳ Total Time*\n\($time)" }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: "🕐 Last Checked: \($ts)" }
                    ]
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "View Detailed Report", emoji: true },
                        url: $url,
                        style: "primary"
                      }
                    ]
                  }
                ]
              }]
            }')

          curl -s -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
